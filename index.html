<!DOCTYPE html>
<html lang="en" data-mode="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="Restaurant Menu"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Menu</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="assets/css/tokens.css"/>
<link rel="stylesheet" href="assets/css/style.css"/>
<!-- Runtime token overrides injected by engine.js -->
<style id="live-tokens"></style>
</head>
<body data-layout="grid" data-columns="3" data-density="normal" data-card-style="shadow" data-image-ratio="4:3">

<div id="toast-container"></div>

<!-- ── Header ── -->
<header class="site-header" id="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">
      <div class="brand-mark">
        <i class="fa-solid fa-utensils"></i>
      </div>
      <div>
        <div class="brand-name">Menu</div>
        <div class="brand-sub"></div>
      </div>
    </a>

    <div class="header-search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="search" id="menu-search" class="search-input"
             placeholder="Search dishes…" autocomplete="off"/>
    </div>

    <div class="header-actions">
      <button class="icon-btn" onclick="Engine.toggleDark()" title="Toggle dark mode">
        <i class="fa-solid fa-moon dark-icon" id="dark-icon"></i>
      </button>
      <a class="icon-btn" href="admin.html" title="Admin">
        <i class="fa-solid fa-lock"></i>
      </a>
    </div>
  </div>
</header>

<!-- ── Category nav ── -->
<nav class="cat-nav-bar" aria-label="Menu categories">
  <div class="cat-nav-inner" id="cat-nav"></div>
</nav>

<!-- ── Dynamic page sections (rendered by engine.js) ── -->
<div id="page-sections"></div>

<!-- ── Loading ── -->
<div id="menu-loading" class="menu-loading">
  <div class="spinner"></div>
  <p>Loading menu…</p>
</div>

<!-- ── Menu content ── -->
<main class="menu-content" id="menu-content" style="visibility:hidden">
  <div id="no-results" class="no-results hidden">
    <i class="fa-solid fa-face-frown-open"></i>
    <h3>Nothing found</h3>
    <p>No dishes match "<span id="search-term"></span>"</p>
  </div>
</main>

<!-- ── Footer ── -->
<footer class="site-footer">
  <strong>Maison Élite</strong> &nbsp;·&nbsp; Fine Dining &nbsp;·&nbsp;
  <span id="yr"></span>
</footer>

<script src="assets/js/engine.js"></script>
</body>
</html>
